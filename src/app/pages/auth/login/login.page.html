@if (!isNative) {
<ion-header class="ion-no-border">
  <app-browser-header [cartCount]="0" [isLoggedIn]="false" />
</ion-header>
}

<ion-content [fullscreen]="true">
  <div
    class="flex min-h-full flex-col items-center justify-center gap-[52px] bg-background p-8 mx-auto max-w-md"
  >
    <!-- Logo -->
    <app-cyna-logo variant="mark" height="54" />

    <!-- Header -->
    <div class="flex flex-col items-center gap-1 text-black">
      <h1 class="!text-[32px] !font-bold !leading-normal !m-0">
        Connectez-vous
      </h1>
      <p class="text-base font-normal">Connectez-vous à votre compte</p>
    </div>

    <!-- Form -->
    <form
      [formGroup]="form"
      (ngSubmit)="onSubmit()"
      class="flex w-full flex-col items-center gap-4"
    >
      <app-input
        label="Email"
        type="email"
        placeholder="votre@email.com"
        formControlName="email"
      />
      <app-input
        label="Mot de passe"
        type="password"
        placeholder="****************"
        formControlName="password"
      />

      <!-- Remember me -->
      <div class="flex w-full flex-col items-start">
        <app-checkbox label="Se souvenir de moi" formControlName="rememberMe" />
      </div>

      <!-- Forgot password -->
      <div class="flex w-full items-center justify-end">
        <a
          routerLink="/auth/forgot-password"
          class="text-xs font-normal text-primary"
        >
          Mot de passe oublié ?
        </a>
      </div>

      <!-- Submit -->
      <app-button label="Se connecter" type="submit" variant="primary" />

      <!-- Register link -->
      <p class="text-xs text-black">
        Pas encore de compte ?
        <a routerLink="/auth/register" class="font-bold text-primary"
          >S'inscrire</a
        >
      </p>
    </form>
  </div>
</ion-content>
