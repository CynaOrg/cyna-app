@if (!isNative) {
<ion-header class="ion-no-border">
  <app-browser-header />
</ion-header>
}

<ion-content [fullscreen]="true">
  <div
    class="flex min-h-full flex-col items-center gap-[52px] bg-background p-8 pt-12 mx-auto max-w-md"
  >
    <!-- Header -->
    <div class="flex flex-col items-center gap-1 text-black">
      <h1 class="!text-[32px] !font-bold !leading-normal !m-0">
        Connectez-vous
      </h1>
      <p class="text-base font-normal">Connectez-vous a votre compte</p>
    </div>

    <!-- Form -->
    <form
      [formGroup]="form"
      (ngSubmit)="onSubmit()"
      class="flex w-full flex-col items-center gap-4"
    >
      <app-input
        label="Email"
        type="email"
        placeholder="votre@email.com"
        formControlName="email"
        [error]="form.get('email')?.dirty && form.get('email')?.hasError('pattern') ? 'Adresse email invalide' : ''"
      />
      <app-input
        label="Mot de passe"
        type="password"
        placeholder="****************"
        formControlName="password"
      />

      <!-- Forgot password -->
      <div class="flex w-full items-center justify-end">
        <a
          routerLink="/auth/forgot-password"
          class="text-xs font-normal text-primary"
        >
          Mot de passe oublie ?
        </a>
      </div>

      <!-- Submit -->
      <app-button
        label="Se connecter"
        type="submit"
        variant="primary"
        [disabled]="isLoading || form.invalid"
      />

      <!-- Error message -->
      @if (errorMessage) {
      <p class="w-full text-center text-sm text-error">{{ errorMessage }}</p>
      @if (showResendLink) {
      <a
        (click)="goToResendEmail()"
        class="flex w-full cursor-pointer items-center justify-center rounded-full border-2 border-primary px-6 py-3 text-[15px] font-semibold text-primary hover:bg-primary hover:text-text-inverse transition-colors"
      >
        Renvoyer un email de verification
      </a>
      } }

      <!-- Register link -->
      <p class="text-xs text-black">
        Pas encore de compte ?
        <a routerLink="/auth/register" class="font-bold text-primary"
          >S'inscrire</a
        >
      </p>
    </form>
  </div>
</ion-content>
