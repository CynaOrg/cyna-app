@if (!isNative) {
<ion-header class="ion-no-border">
  <app-browser-header />
</ion-header>
}

<ion-content [fullscreen]="true">
  <div
    class="flex min-h-full flex-col items-center gap-[52px] bg-background p-8 pt-12 mx-auto max-w-md"
  >
    <!-- Header -->
    <div class="flex flex-col items-center gap-1 text-black">
      <h1 class="!text-[32px] !font-bold !leading-normal !m-0">
        Verification de l'email
      </h1>
    </div>

    <!-- Loading -->
    @if (isLoading) {
    <p class="text-base text-text-secondary">Verification en cours...</p>
    }

    <!-- Success -->
    @if (successMessage) {
    <div class="flex w-full flex-col items-center gap-4">
      <p class="w-full text-center text-sm text-success">
        {{ successMessage }}
      </p>
      <app-button
        label="Se connecter"
        variant="primary"
        routerLink="/auth/login"
      />
    </div>
    }

    <!-- Error -->
    @if (errorMessage) {
    <div class="flex w-full flex-col items-center gap-4">
      <p class="w-full text-center text-sm text-error">{{ errorMessage }}</p>
      <app-button
        label="Retour a la connexion"
        variant="primary"
        routerLink="/auth/login"
      />
    </div>
    }
  </div>
</ion-content>
