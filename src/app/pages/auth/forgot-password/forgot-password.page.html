@if (!isNative) {
<ion-header class="ion-no-border">
  <app-browser-header />
</ion-header>
}

<ion-content [fullscreen]="true">
  <div
    class="flex min-h-full flex-col items-center gap-[52px] bg-background p-8 pt-12 mx-auto max-w-md"
  >
    <!-- Header -->
    <div class="flex flex-col items-center gap-1 text-black">
      <h1 class="!text-[32px] !font-bold !leading-normal !m-0">
        Mot de passe oublie
      </h1>
      <p class="text-base font-normal text-center">
        Entrez votre adresse email pour recevoir un lien de reinitialisation
      </p>
    </div>

    <!-- Form -->
    <form
      [formGroup]="form"
      (ngSubmit)="onSubmit()"
      class="flex w-full flex-col items-center gap-4"
    >
      <app-input
        label="Email"
        type="email"
        placeholder="votre@email.com"
        formControlName="email"
        [error]="form.get('email')?.dirty && form.get('email')?.hasError('pattern') ? 'Adresse email invalide' : ''"
      />

      <!-- Submit -->
      <app-button
        label="Envoyer le lien"
        type="submit"
        variant="primary"
        [disabled]="isLoading || form.invalid"
      />

      <!-- Login link -->
      <p class="text-xs text-black">
        <a routerLink="/auth/login" class="font-bold text-primary"
          >Retour a la connexion</a
        >
      </p>
    </form>
  </div>
</ion-content>
