<div class="flex flex-col gap-6">
  @if (isLoading()) {
  <div class="flex items-center justify-center py-12">
    <div
      class="h-8 w-8 animate-spin rounded-full border-2 border-primary border-t-transparent"
    ></div>
  </div>
  } @else if (error()) {
  <div class="rounded-lg bg-red-50 p-4">
    <p class="text-sm text-red-600">{{ error() }}</p>
  </div>
  } @else if (!licenses().length) {
  <div class="flex flex-col items-center justify-center gap-4 py-12">
    <ng-icon
      name="phosphorCertificate"
      style="font-size: 36px; color: #9ca3af"
    ></ng-icon>
    <p class="text-sm text-gray-400">
      {{ 'DASHBOARD.LICENSES.EMPTY' | translate }}
    </p>
  </div>
  } @else {
  <div class="flex flex-col gap-3">
    @for (license of licenses(); track license.licenseKey) {
    <div class="rounded-2xl bg-gray-50 p-5 flex flex-col gap-3">
      <div class="flex items-start justify-between">
        <span class="text-sm font-semibold text-black"
          >{{ license.productName }}</span
        >
        <span
          class="px-2 py-0.5 rounded-full text-[10px] font-medium"
          [style.background-color]="getStatusColor(license.status) + '20'"
          [style.color]="getStatusColor(license.status)"
        >
          {{ license.status }}
        </span>
      </div>

      <div class="flex items-center gap-2">
        <code
          class="flex-1 rounded-lg bg-white px-3 py-2 text-xs font-mono text-black border border-gray-200"
        >
          {{ license.licenseKey }}
        </code>
        <button
          (click)="copyKey(license.licenseKey)"
          class="flex items-center justify-center rounded-lg px-3 py-2 text-xs font-medium transition-colors"
          [style.background-color]="copiedKey === license.licenseKey ? '#34c759' : '#4f39f6'"
          style="color: #ffffff"
        >
          {{ (copiedKey === license.licenseKey ? 'DASHBOARD.LICENSES.COPIED' :
          'DASHBOARD.LICENSES.COPY') | translate }}
        </button>
      </div>
    </div>
    }
  </div>
  }
</div>
