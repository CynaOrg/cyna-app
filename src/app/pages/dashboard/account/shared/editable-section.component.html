<section
  class="py-6 first:pt-0 last:pb-0 border-b border-border-light last:border-b-0"
>
  <div class="mb-4 flex items-center justify-between gap-3">
    <h3 class="text-xs font-semibold uppercase tracking-wide text-text-muted">
      {{ titleKey | translate }}
    </h3>
    @if (!isEditing()) {
      <button
        type="button"
        data-test="modify-btn"
        (click)="enterEdit()"
        class="text-sm font-medium text-primary hover:underline bg-transparent p-0"
      >
        {{ "COMMON.EDIT" | translate }}
      </button>
    }
  </div>

  @if (!isEditing()) {
    <ng-container *ngTemplateOutlet="viewTemplate" />
  } @else {
    <ng-container *ngTemplateOutlet="editTemplate" />

    @if (errorMessage) {
      <p class="mt-3 text-sm text-red-500">{{ errorMessage }}</p>
    }

    <div class="mt-4 flex flex-col gap-2 sm:flex-row sm:gap-3">
      <button
        type="button"
        data-test="save-btn"
        (click)="onSubmit()"
        [disabled]="!canSave || saving"
        class="inline-flex min-h-11 items-center justify-center gap-2 rounded-full bg-primary px-6 py-3 text-sm font-semibold text-white transition-colors hover:bg-primary-hover disabled:cursor-not-allowed disabled:opacity-50"
      >
        @if (saving) {
          <span
            data-test="spinner"
            class="h-4 w-4 animate-spin rounded-full border-2 border-white/30 border-t-white"
          ></span>
        }
        {{ "COMMON.SAVE" | translate }}
      </button>
      <button
        type="button"
        data-test="cancel-btn"
        (click)="onCancel()"
        [disabled]="saving"
        class="inline-flex min-h-11 items-center justify-center rounded-full border border-border bg-surface px-6 py-3 text-sm font-medium text-text-primary transition-colors hover:bg-background disabled:opacity-50 disabled:cursor-not-allowed"
      >
        {{ "COMMON.CANCEL" | translate }}
      </button>
    </div>
  }
</section>
