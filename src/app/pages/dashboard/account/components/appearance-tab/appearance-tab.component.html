<section class="rounded-2xl border border-border bg-surface p-5 sm:p-6">
  <div class="flex items-center gap-3">
    <ng-icon name="phosphorGlobe" class="text-2xl text-primary" />
    <div>
      <h3 class="text-lg font-semibold text-text-primary">
        {{ 'PROFILE.PREFERENCES.SECTION_TITLE' | translate }}
      </h3>
      <p class="text-sm text-text-secondary">
        {{ 'PROFILE.PREFERENCES.SECTION_DESCRIPTION' | translate }}
      </p>
    </div>
  </div>

  <div class="mt-5">
    <label class="mb-3 block text-sm font-medium text-text-primary">
      {{ 'PROFILE.PREFERENCES.LANGUAGE_LABEL' | translate }}
    </label>
    <div class="flex flex-col gap-3 sm:flex-row">
      <button
        type="button"
        (click)="onLanguageChange('fr')"
        [disabled]="languageLoading()"
        class="inline-flex min-h-[46px] items-center justify-center rounded-full border-2 px-6 py-3 text-[15px] font-semibold leading-normal transition-colors disabled:opacity-50 disabled:cursor-not-allowed"
        [class.border-primary]="currentLanguage === 'fr'"
        [class.bg-primary/5]="currentLanguage === 'fr'"
        [class.text-primary]="currentLanguage === 'fr'"
        [class.border-border]="currentLanguage !== 'fr'"
        [class.text-text-secondary]="currentLanguage !== 'fr'"
      >
        {{ 'PROFILE.PREFERENCES.FRENCH' | translate }}
      </button>
      <button
        type="button"
        (click)="onLanguageChange('en')"
        [disabled]="languageLoading()"
        class="inline-flex min-h-[46px] items-center justify-center rounded-full border-2 px-6 py-3 text-[15px] font-semibold leading-normal transition-colors disabled:opacity-50 disabled:cursor-not-allowed"
        [class.border-primary]="currentLanguage === 'en'"
        [class.bg-primary/5]="currentLanguage === 'en'"
        [class.text-primary]="currentLanguage === 'en'"
        [class.border-border]="currentLanguage !== 'en'"
        [class.text-text-secondary]="currentLanguage !== 'en'"
      >
        {{ 'PROFILE.PREFERENCES.ENGLISH' | translate }}
      </button>
    </div>

    @if (error) {
    <div class="mt-4 rounded-lg border border-red-200 bg-red-50 px-4 py-3">
      <p class="text-sm text-red-600">{{ error }}</p>
    </div>
    }

    @if (languageSuccess()) {
    <div
      class="mt-4 rounded-lg border border-green-200 bg-green-50 px-4 py-3"
    >
      <p class="text-sm text-green-600">
        {{ 'PROFILE.PREFERENCES.UPDATE_SUCCESS' | translate }}
      </p>
    </div>
    }
  </div>
</section>
