<ion-content [fullscreen]="true">
  <div class="min-h-full bg-background">
    <app-dashboard-topbar title="DASHBOARD.ACCOUNT_TITLE" />

    <div class="px-4 pb-10 pt-2 sm:px-6 lg:px-8">
      <div class="mx-auto w-full lg:max-w-3xl">
        <div class="border-b border-border-light">
          <div
            role="tablist"
            aria-label="Account settings tabs"
            class="flex gap-6 overflow-x-auto whitespace-nowrap py-2 text-sm"
          >
            @for (tab of ['account', 'security', 'billing', 'addresses',
            'preferences']; track tab) {
            <button
              type="button"
              role="tab"
              [id]="tab + '-tab'"
              [attr.aria-selected]="activeTab() === tab"
              [attr.aria-controls]="tab + '-panel'"
              (click)="onTabClick($any(tab))"
              class="border-b-2 pb-2 text-sm font-semibold transition-colors bg-transparent p-0"
              [class.border-primary]="activeTab() === tab"
              [class.text-primary]="activeTab() === tab"
              [class.border-transparent]="activeTab() !== tab"
              [class.text-text-secondary]="activeTab() !== tab"
            >
              {{ 'ACCOUNT.TABS.' + tab.toUpperCase() | translate }}
            </button>
            }
          </div>
        </div>

        <div class="py-6">
          @if (activeTab() === 'account') {
          <div id="account-panel" role="tabpanel" aria-labelledby="account-tab">
            <app-account-tab
              [user]="currentUser()"
              (profileSubmit)="onProfileSubmit($event)"
            />
          </div>
          } @else if (activeTab() === 'security') {
          <div
            id="security-panel"
            role="tabpanel"
            aria-labelledby="security-tab"
          >
            <app-security-tab
              [error]="passwordError()"
              (passwordSubmit)="onPasswordSubmit($event)"
            />
          </div>
          } @else if (activeTab() === 'billing') {
          <div id="billing-panel" role="tabpanel" aria-labelledby="billing-tab">
            <app-billing-tab />
          </div>
          } @else if (activeTab() === 'addresses') {
          <div
            id="addresses-panel"
            role="tabpanel"
            aria-labelledby="addresses-tab"
          >
            <app-addresses-tab />
          </div>
          } @else if (activeTab() === 'preferences') {
          <div
            id="preferences-panel"
            role="tabpanel"
            aria-labelledby="preferences-tab"
          >
            <app-preferences-tab
              [currentLanguage]="currentLanguage()"
              [error]="languageError()"
              [savedFlash]="languageSaved()"
              (languageChange)="onLanguageChange($event)"
            />
          </div>
          }
        </div>
      </div>
    </div>
  </div>
</ion-content>
