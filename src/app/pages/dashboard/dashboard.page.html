<ion-content [fullscreen]="true">
  <div class="min-h-full bg-background">
    <app-dashboard-topbar
      [title]="topbarTitle()"
      [subtitle]="topbarSubtitle()"
    />
    @if (hasChildRoute()) {
    <div class="p-6 mx-auto max-w-3xl">
      <router-outlet></router-outlet>
    </div>
    } @else {
    <!-- Welcome overview -->
    <div
      class="flex flex-col items-center justify-center gap-8 py-12 px-6 mx-auto max-w-3xl"
    >
      <div class="flex flex-col items-center gap-3 text-center">
        <div
          class="flex h-16 w-16 items-center justify-center rounded-full bg-primary-light"
        >
          <svg
            class="h-8 w-8 text-primary"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
            stroke-width="1.5"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z"
            />
          </svg>
        </div>

        <h1 class="!text-2xl !font-bold !m-0 text-text-primary">
          {{ 'DASHBOARD.WELCOME' | translate }}
        </h1>

        @if (user(); as u) {
        <p class="text-sm text-text-secondary">
          {{ u.firstName }} {{ u.lastName }}
        </p>
        <p class="text-xs text-text-secondary">{{ u.email }}</p>
        }
      </div>

      <!-- Quick links -->
      <div class="grid grid-cols-1 sm:grid-cols-3 gap-3 w-full max-w-lg">
        <a
          routerLink="/dashboard/orders"
          class="flex flex-col items-center gap-2 rounded-2xl border border-border-light bg-surface p-5 transition-colors hover:bg-gray-50"
          style="text-decoration: none"
        >
          <ng-icon
            name="phosphorPackage"
            style="font-size: 24px; color: #4f39f6"
          ></ng-icon>
          <span class="text-sm font-medium text-black"
            >{{ 'DASHBOARD.ORDERS.TITLE' | translate }}</span
          >
        </a>
        <a
          routerLink="/dashboard/subscriptions"
          class="flex flex-col items-center gap-2 rounded-2xl border border-border-light bg-surface p-5 transition-colors hover:bg-gray-50"
          style="text-decoration: none"
        >
          <ng-icon
            name="phosphorShieldCheck"
            style="font-size: 24px; color: #4f39f6"
          ></ng-icon>
          <span class="text-sm font-medium text-black"
            >{{ 'DASHBOARD.SUBSCRIPTIONS.TITLE' | translate }}</span
          >
        </a>
        <a
          routerLink="/dashboard/licenses"
          class="flex flex-col items-center gap-2 rounded-2xl border border-border-light bg-surface p-5 transition-colors hover:bg-gray-50"
          style="text-decoration: none"
        >
          <ng-icon
            name="phosphorCertificate"
            style="font-size: 24px; color: #4f39f6"
          ></ng-icon>
          <span class="text-sm font-medium text-black"
            >{{ 'DASHBOARD.LICENSES.TITLE' | translate }}</span
          >
        </a>
      </div>
    </div>
    }
  </div>
</ion-content>
