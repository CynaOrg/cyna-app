<ion-content [fullscreen]="true">
  <div
    class="flex min-h-full flex-col items-center justify-center gap-8 bg-background p-8 mx-auto max-w-lg"
  >
    <!-- Welcome -->
    <div class="flex flex-col items-center gap-3 text-center">
      <div
        class="flex h-16 w-16 items-center justify-center rounded-full bg-primary-light"
      >
        <svg
          class="h-8 w-8 text-primary"
          fill="none"
          viewBox="0 0 24 24"
          stroke="currentColor"
          stroke-width="1.5"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M15.75 6a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0zM4.501 20.118a7.5 7.5 0 0114.998 0A17.933 17.933 0 0112 21.75c-2.676 0-5.216-.584-7.499-1.632z"
          />
        </svg>
      </div>

      <h1 class="!text-2xl !font-bold !m-0 text-text-primary">
        {{ 'DASHBOARD.WELCOME' | translate }}
      </h1>

      @if (user(); as u) {
      <p class="text-sm text-text-secondary">
        {{ u.firstName }} {{ u.lastName }}
      </p>
      <p class="text-xs text-text-secondary">{{ u.email }}</p>
      }
    </div>

    <!-- Placeholder -->
    <div
      class="w-full rounded-2xl border border-border-light bg-surface p-8 text-center"
    >
      <p class="text-sm text-text-secondary">
        {{ 'DASHBOARD.EMPTY' | translate }}
      </p>
    </div>

    <!-- Actions -->
    <div class="flex w-full flex-col gap-3">
      <a
        routerLink="/landing"
        class="flex w-full items-center justify-center rounded-full border border-border-light px-6 py-3 text-[15px] font-semibold text-text-primary transition-colors hover:bg-surface"
        style="text-decoration: none"
      >
        {{ 'DASHBOARD.BROWSE' | translate }}
      </a>
      <button
        (click)="logout()"
        class="flex w-full items-center justify-center rounded-full px-6 py-3 text-[15px] font-semibold transition-colors"
        style="background-color: rgba(255, 56, 60, 0.1); color: #ff383c"
      >
        {{ 'DASHBOARD.LOGOUT' | translate }}
      </button>
    </div>
  </div>
</ion-content>
