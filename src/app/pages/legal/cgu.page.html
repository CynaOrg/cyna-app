<ion-header class="ion-no-border">
  <app-browser-header />
</ion-header>

<ion-content [fullscreen]="true">
  <article class="w-full max-w-3xl mx-auto px-6 py-12 md:py-20">
    <h1 class="text-3xl md:text-4xl font-bold text-gray-900 mb-4">
      {{ 'LEGAL.CGU.TITLE' | translate }}
    </h1>
    <p class="text-sm text-gray-500 mb-10">
      {{ 'LEGAL.CGU.LAST_UPDATE' | translate }}
    </p>

    @for (section of sections; track section.titleKey; let i = $index) {
    <section class="mb-8">
      <h2 class="text-xl font-semibold text-gray-900 mb-3">
        {{ i + 1 }}. {{ section.titleKey | translate }}
      </h2>
      <p class="text-gray-600 leading-relaxed">
        {{ section.contentKey | translate }}
      </p>
    </section>
    }
  </article>
</ion-content>
