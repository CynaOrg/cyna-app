<ion-header class="ion-no-border">
  <app-browser-header />
</ion-header>

<ion-content [fullscreen]="true">
  <!-- Hero -->
  <app-hero />

  <!-- Stats strip -->
  <app-trusted-by />

  <!-- Category cards -->
  <app-category-cards />

  <!-- Featured products section -->
  <section class="w-full py-14 md:py-24" style="background: #ffffff">
    <div class="mx-auto max-w-7xl px-6 md:px-8">
      <!-- Header: title left, CTA right -->
      <div class="mb-10 flex items-center justify-between">
        <h2
          class="font-semibold leading-normal"
          style="font-size: clamp(20px, 3vw, 32px); color: #0a0a0a"
        >
          {{ 'LANDING.FEATURED_TITLE' | translate }}
        </h2>
        <a
          routerLink="/products"
          class="hidden items-center gap-1.5 text-sm font-medium transition-colors hover:opacity-70 sm:inline-flex"
          style="color: #4f39f6; text-decoration: none"
        >
          {{ 'LANDING.SEE_ALL' | translate }}
          <svg
            class="h-4 w-4"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
            stroke-width="2"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="m8.25 4.5 7.5 7.5-7.5 7.5"
            />
          </svg>
        </a>
      </div>

      <!-- Product grid -->
      <div class="w-full">
        <app-product-list
          [products]="allProducts"
          [isLoading]="isLoading"
          [error]="error ?? undefined"
          [showHeader]="false"
          variant="browser"
        />
      </div>

      <!-- Mobile-only "See all" link -->
      <div class="mt-8 flex justify-center sm:hidden">
        <a
          routerLink="/products"
          class="inline-flex items-center gap-1.5 text-sm font-medium"
          style="color: #4f39f6; text-decoration: none"
        >
          {{ 'LANDING.SEE_ALL' | translate }}
          <svg
            class="h-4 w-4"
            fill="none"
            viewBox="0 0 24 24"
            stroke="currentColor"
            stroke-width="2"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="m8.25 4.5 7.5 7.5-7.5 7.5"
            />
          </svg>
        </a>
      </div>
    </div>
  </section>

  <!-- Section FAQ -->
  <section class="w-full py-12 overflow-x-clip">
    <div class="w-full max-w-7xl mx-auto px-6 md:px-10">
      <app-section-header
        [title]="'FAQ.TITLE' | translate"
        [centered]="true"
        variant="browser"
      />
      <div class="mt-8">
        <app-faq [tabs]="faqTabs" />
      </div>
    </div>
  </section>

  <!-- Section CTA finale -->
  <section class="w-full py-20 md:py-28">
    <div
      class="flex flex-col items-center gap-6 px-8 max-w-2xl mx-auto text-center"
    >
      <h2
        class="font-semibold leading-normal whitespace-nowrap"
        style="font-size: clamp(24px, 3vw, 36px); color: #0a0a0a"
      >
        {{ 'LANDING.CTA_TITLE' | translate }}
      </h2>
      <p style="font-size: 16px; line-height: 1.6; color: #6b7280">
        {{ 'LANDING.CTA_SUBTITLE' | translate }}
      </p>
      <a
        routerLink="/products"
        class="inline-flex items-center justify-center font-semibold rounded-full transition-colors hover:opacity-90"
        style="
          padding: 14px 36px;
          font-size: 15px;
          color: #ffffff;
          background-color: #4f39f6;
        "
      >
        {{ 'LANDING.CTA_BUTTON' | translate }}
      </a>
    </div>
  </section>

  <app-footer />
</ion-content>
