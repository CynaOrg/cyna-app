<ion-header class="ion-no-border">
  <app-browser-header [cartCount]="0" [isLoggedIn]="false" />
</ion-header>

<ion-content [fullscreen]="true">
  <app-hero />
  <app-trusted-by />

  <!-- Section Services -->
  <section class="flex flex-col gap-[32px] items-center w-full px-10 py-16">
    <app-section-header
      title="Découvrez nos services"
      subtitle="Des solutions conçues par des experts pour vous offrir une protection complète et adaptée à vos enjeux métier."
      variant="browser"
    />
    <!-- Liste des services (à implémenter plus tard) -->
  </section>

  <!-- Section Produits -->
  <section class="flex flex-col gap-[32px] items-center w-full px-10 py-16">
    <app-section-header
      title="Découvrez nos produits"
      subtitle="Hardware, licences et accessoires : tout ce dont vous avez besoin pour renforcer la sécurité de votre entreprise au quotidien."
      variant="browser"
    />
    <!-- Liste des produits (à implémenter plus tard) -->
  </section>
</ion-content>
