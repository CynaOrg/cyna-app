<ion-header class="ion-no-border">
  <app-browser-header />
</ion-header>

<ion-content [fullscreen]="true">
  <app-hero />
  <app-trusted-by />

  <!-- Section Services -->
  <section
    class="flex flex-col gap-8 items-center w-full py-14 overflow-x-clip"
  >
    <div class="px-10 w-full flex justify-center">
      <app-section-header
        [title]="'LANDING.SERVICES_TITLE' | translate"
        [subtitle]="'LANDING.SERVICES_SUBTITLE' | translate"
        variant="browser"
      />
    </div>
    <div class="w-full md:px-10">
      <div class="w-full max-w-7xl mx-auto">
        <app-product-list
          [products]="services"
          [isLoading]="isLoading"
          [error]="error ?? undefined"
          [showHeader]="false"
          linkRoute="/services"
          variant="browser"
        />
      </div>
    </div>
  </section>

  <!-- Divider -->
  <div class="max-w-7xl mx-auto px-10">
    <div class="border-t border-border/50"></div>
  </div>

  <!-- Section Licences -->
  <section
    class="flex flex-col gap-8 items-center w-full py-14 overflow-x-clip"
  >
    <div class="px-10 w-full flex justify-center">
      <app-section-header
        [title]="'LANDING.LICENSES_TITLE' | translate"
        [subtitle]="'LANDING.LICENSES_SUBTITLE' | translate"
        variant="browser"
      />
    </div>
    <div class="w-full md:px-10">
      <div class="w-full max-w-7xl mx-auto">
        <app-product-list
          [products]="licenses"
          [isLoading]="isLoading"
          [error]="error ?? undefined"
          [showHeader]="false"
          linkRoute="/licenses"
          variant="browser"
        />
      </div>
    </div>
  </section>

  <!-- Divider -->
  <div class="max-w-7xl mx-auto px-10">
    <div class="border-t border-border/50"></div>
  </div>

  <!-- Section Produits -->
  <section
    class="flex flex-col gap-8 items-center w-full py-14 overflow-x-clip"
  >
    <div class="px-10 w-full flex justify-center">
      <app-section-header
        [title]="'LANDING.PRODUCTS_TITLE' | translate"
        [subtitle]="'LANDING.PRODUCTS_SUBTITLE' | translate"
        variant="browser"
      />
    </div>
    <div class="w-full md:px-10">
      <div class="w-full max-w-7xl mx-auto">
        <app-product-list
          [products]="products"
          [isLoading]="isLoading"
          [showHeader]="false"
          linkRoute="/products"
          variant="browser"
        />
      </div>
    </div>
  </section>

  <!-- Section FAQ -->
  <section
    class="flex flex-col gap-[32px] items-center w-full py-10 overflow-x-clip"
  >
    <div class="px-10 w-full flex justify-center">
      <app-section-header [title]="'FAQ.TITLE' | translate" variant="browser" />
    </div>
    <div class="w-full px-6 md:px-10">
      <app-faq [tabs]="faqTabs" />
    </div>
  </section>

  <!-- Section CTA finale -->
  <section class="w-full py-20 md:py-28">
    <div
      class="flex flex-col items-center gap-6 px-8 max-w-2xl mx-auto text-center"
    >
      <h2
        class="font-semibold leading-normal whitespace-nowrap"
        style="font-size: clamp(24px, 3vw, 36px); color: #0a0a0a"
      >
        {{ 'LANDING.CTA_TITLE' | translate }}
      </h2>
      <p style="font-size: 16px; line-height: 1.6; color: #6b7280">
        {{ 'LANDING.CTA_SUBTITLE' | translate }}
      </p>
      <a
        routerLink="/products"
        class="inline-flex items-center justify-center font-semibold rounded-full transition-colors hover:opacity-90"
        style="
          padding: 14px 36px;
          font-size: 15px;
          color: #ffffff;
          background-color: #4f39f6;
        "
      >
        {{ 'LANDING.CTA_BUTTON' | translate }}
      </a>
    </div>
  </section>

  <app-footer />
</ion-content>
