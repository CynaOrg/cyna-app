<ion-header class="ion-no-border">
  <app-browser-header [cartCount]="0" [isLoggedIn]="false" />
</ion-header>

<ion-content [fullscreen]="true">
  <app-hero />
  <app-trusted-by />

  <!-- Section Services -->
  <section
    class="flex flex-col gap-[32px] items-center w-full py-10 overflow-x-clip"
  >
    <div class="px-10 w-full flex justify-center">
      <app-section-header
        title="Découvrez nos services"
        subtitle="Des solutions conçues par des experts pour vous offrir une protection complète et adaptée à vos enjeux métier."
        variant="browser"
      />
    </div>
    <!-- No horizontal padding - handled inside product-list for edge-to-edge scroll -->
    <div class="w-full md:px-10">
      <div class="w-full max-w-7xl mx-auto">
        <app-product-list
          [products]="mockServices"
          [showHeader]="false"
          linkRoute="/services"
          variant="browser"
        />
      </div>
    </div>
  </section>

  <!-- Section Produits -->
  <section
    class="flex flex-col gap-[32px] items-center w-full py-10 overflow-x-clip"
  >
    <div class="px-10 w-full flex justify-center">
      <app-section-header
        title="Découvrez nos produits"
        subtitle="Hardware, licences et accessoires : tout ce dont vous avez besoin pour renforcer la sécurité de votre entreprise au quotidien."
        variant="browser"
      />
    </div>
    <!-- No horizontal padding - handled inside product-list for edge-to-edge scroll -->
    <div class="w-full md:px-10">
      <div class="w-full max-w-7xl mx-auto">
        <app-product-list
          [products]="mockProducts"
          [showHeader]="false"
          linkRoute="/products"
          variant="browser"
        />
      </div>
    </div>
  </section>
</ion-content>
