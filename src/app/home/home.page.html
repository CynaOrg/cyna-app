<ion-header class="ion-no-border">
  @if (isNative) {
  <ion-toolbar
    [style.--padding-top]="0"
    [style.--padding-bottom]="0"
    [style.--padding-start]="0"
    [style.--padding-end]="0"
    [style.--min-height]="0"
  >
    <app-mobile-header [cartCount]="1" />
  </ion-toolbar>
  } @else {
  <app-browser-header [cartCount]="1" [isLoggedIn]="false" />
  }
</ion-header>

<ion-content [fullscreen]="true">
  @if (isNative) {
  <div class="flex flex-col gap-8 px-4 py-6">
    <!-- Section Services -->
    <app-product-list
      [products]="services"
      [isLoading]="isLoading"
      [error]="error ?? undefined"
      title="Top services du moment"
      linkText="Voir tout"
      linkRoute="/tabs/catalogue"
      variant="mobile"
    />

    <!-- Section Produits -->
    <app-product-list
      [products]="products"
      [isLoading]="isLoading"
      title="Top produits du moment"
      linkText="Voir tout"
      linkRoute="/tabs/catalogue"
      variant="mobile"
    />
  </div>
  } @else {
  <div class="flex flex-col gap-12 px-8 py-12 max-w-7xl mx-auto">
    <!-- Section Services -->
    <app-product-list
      [products]="services"
      [isLoading]="isLoading"
      [error]="error ?? undefined"
      title="Nos services de cybersecurite"
      linkText="Voir tout"
      linkRoute="/services"
      variant="browser"
    />

    <!-- Section Produits -->
    <app-product-list
      [products]="products"
      [isLoading]="isLoading"
      title="Nos produits"
      linkText="Voir tout"
      linkRoute="/products"
      variant="browser"
    />
  </div>
  }
</ion-content>

@if (isNative) {
<ion-footer class="ion-no-border">
  <app-navbar />
</ion-footer>
}
